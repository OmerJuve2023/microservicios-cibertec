openapi: 3.0.3
info:
  title: API Microservicios
  description: Documentación completa de todos los endpoints de la arquitectura de microservicios
  version: 1.0.0
  contact:
    name: Equipo Backend

servers:
  - url: http://localhost:8080
    description: Servidor local (API Gateway)
  - url: http://localhost:8081
    description: MS-Usuarios
  - url: http://localhost:8082
    description: MS-Clientes
  - url: http://localhost:8083
    description: MS-Aplicaciones
  - url: http://localhost:8084
    description: MS-Menus

tags:
  - name: Autenticación
    description: Endpoints de login y validación de tokens
  - name: Personas
    description: Gestión de personas (MS-Usuarios)
  - name: Usuarios
    description: Gestión de usuarios del sistema (MS-Usuarios)
  - name: AccesosMenus
    description: Asignación de menús a usuarios (MS-Usuarios)
  - name: Clientes
    description: Gestión de clientes (MS-Clientes)
  - name: Aplicaciones
    description: Gestión de aplicaciones (MS-Aplicaciones)
  - name: ClienteAplicacion
    description: Contratos entre clientes y aplicaciones (MS-Aplicaciones)
  - name: Menus
    description: Gestión de menús (MS-Menus)

paths:
  /auth/login:
    post:
      tags:
        - Autenticación
      summary: Iniciar sesión y obtener token JWT
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Credenciales incorrectas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Servicio no disponible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/validate:
    get:
      tags:
        - Autenticación
      summary: Validar un token JWT
      operationId: validateToken
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Token válido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token inválido o expirado

  # ============================================================
  # MS-USUARIOS - Personas
  # ============================================================
  /api/usuarios/personas:
    get:
      tags:
        - Personas
      summary: Listar todas las personas
      operationId: getAllPersonas
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Lista de personas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Persona'
    post:
      tags:
        - Personas
      summary: Crear una nueva persona
      operationId: createPersona
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonaInput'
      responses:
        '201':
          description: Persona creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Persona'

  /api/usuarios/personas/{id}:
    get:
      tags:
        - Personas
      summary: Obtener persona por ID
      operationId: getPersonaById
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Persona encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Persona'
        '404':
          description: Persona no encontrada
    put:
      tags:
        - Personas
      summary: Actualizar persona
      operationId: updatePersona
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonaInput'
      responses:
        '200':
          description: Persona actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Persona'
        '404':
          description: Persona no encontrada
    delete:
      tags:
        - Personas
      summary: Eliminar persona
      operationId: deletePersona
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: Persona eliminada
        '404':

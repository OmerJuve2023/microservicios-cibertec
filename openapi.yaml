components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ============================================================
    # Autenticación
    # ============================================================
    LoginRequest:
      type: object
      required:
        - nombreUsuario
        - password
      properties:
        nombreUsuario:
          type: string
          example: admin
        password:
          type: string
          example: admin123

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9...
        tipo:
          type: string
          example: Bearer
        nombreUsuario:
          type: string
          example: admin
        mensaje:
          type: string
          example: Login exitoso

    ErrorResponse:
      type: object
      properties:
        mensaje:
          type: string
        status:
          type: integer
          format: int32

    # ============================================================
    # Personas
    # ============================================================
    Persona:
      type: object
      properties:
        idPersona:
          type: integer
          format: int32
          example: 1
        nombre:
          type: string
          example: Carlos
        apellido:
          type: string
          example: Ramirez Torres
        email:
          type: string
          example: carlos.ramirez@email.com
        telefono:
          type: string
          example: 987654321
        tipoDocumento:
          type: string
          example: D
        docIdentidad:
          type: string
          example: 45678901
        direccion:
          type: string
          example: Av. Lima 123
        distrito:
          type: string
          example: Miraflores
        provincia:
          type: string
          example: Lima
        departamento:

server:
  port: 8081

spring:
  doc:
    swagger-ui:
      enabled: true
    api-docs:
      path: /v3/api-docs
  application:
    name: ms-usuarios
  datasource:
    url: jdbc:mysql://localhost:3307/db_usuarios?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
